<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">
<a class="navbar-brand" th:href="@{/}">TekkenReborn</a>

<div class="collapse navbar-collapse show">
<ul class="navbar-nav me-auto mb-2 mb-lg-0">
<li class="nav-item">
<a class="nav-link" th:href="@{/}">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/players}">Players</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/fighters}">Fighters</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/register}">Register</a>
</li>

<li class="nav-item" sec:authorize="hasRole('ADMIN')">
<a class="nav-link" th:href="@{/create-fighter}">Create Fighter</a>
</li>

<li class="nav-item" sec:authorize="hasRole('ADMIN')">
<a class="nav-link" th:href="@{/h2-console}">H2 Console</a>
</li>
</ul>

<form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
<button type="submit" class="btn btn-outline-light">Logout</button>
</form>
</div>
</div>
</nav>
</body>
</html>
